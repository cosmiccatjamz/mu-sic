<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU-SIC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    background: #000;
    overflow-x: hidden;
}

/* Starfield canvas */
#stars {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* Header */
header {
    position: relative;
    min-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: url('https://f4.bcbits.com/img/a4068469156_16.jpg') no-repeat center/cover;
    background-size: cover;
    transition: background-position 0.2s;
}

header::after {
    content:'';
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
}

/* Header logo */
#header-logo {
    max-width: 500px;
    width: 90%;
    height: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 25px #68d5f5);
    transition: transform 0.3s, filter 0.3s;
}

#header-logo:hover {
    transform: scale(1.1);
    filter: drop-shadow(0 0 35px #68d5f5);
}

header h1 {
    display: none; /* hide original text since we have a logo */
}

header p {
    font-size: 22px;
    color: #a0e7ff;
    margin: 5px 0;
    text-shadow: 0 0 10px #68d5f5;
}

/* Bandcamp player */
header iframe {
    margin-top: 20px;
    border:0;
    width:350px;
    height:470px;
    border-radius:12px;
    box-shadow: 0 0 35px #68d5f5;
    transition: transform 0.2s;
}

header iframe:hover {
    transform: scale(1.02);
    box-shadow: 0 0 55px #68d5f5;
}

/* Buttons */
a.button {
    display: inline-block;
    padding:12px 25px;
    margin:10px;
    background:#68d5f5;
    color:#000;
    font-weight:bold;
    border-radius:8px;
    text-decoration:none;
    box-shadow:0 0 15px #68d5f5;
    transition:0.3s;
    position: relative;
}

a.button:hover {
    box-shadow: 0 0 35px #68d5f5;
    transform: translateY(-2px);
}

/* Sections */
.section {
    padding:60px 20px;
    max-width:1000px;
    margin:auto;
    text-align:center;
}

.section h2 {
    font-size:36px;
    margin-bottom:25px;
    color:#68d5f5;
    text-shadow:0 0 8px #68d5f5;
}

.section p {
    font-size:18px;
    color:#ddd;
    line-height:1.6;
}

.gallery-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.gallery-grid img {
    width:100%;
    border-radius:10px;
    box-shadow:0 0 15px #68d5f5;
    transition:0.3s;
}

.gallery-grid img:hover {
    transform:scale(1.05);
    box-shadow:0 0 35px #68d5f5;
}

footer {
    padding:40px 20px;
    font-size:14px;
    color:#888;
    background:#0b0b1f;
}

/* Responsive */
@media(max-width:768px){
    #header-logo {width:90%;}
    header p {font-size:18px;}
    header iframe {width:90%; height:400px;}
    .section h2 {font-size:28px;}
    .section p {font-size:16px;}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
    <img src="images/logo.png" alt="MU-SIC Logo" id="header-logo">
    <p>Intergalactic vibes from the cosmic everything</p>
    <p>Pulling signals from stars and souls of eternities forever</p>

    <!-- Bandcamp player -->
    <iframe 
        src="https://bandcamp.com/EmbeddedPlayer/album=4068469156/size=large/bgcol=ffffff/linkcol=0687f5/tracklist=false/transparent=true/" 
        seamless></iframe>

    <!-- Buttons -->
    <a class="button" href="https://mu-sic.bandcamp.com" target="_blank">Bandcamp</a>
    <a class="button" href="https://www.instagram.com/Paul_Mu_Sic" target="_blank">Instagram</a>
    <a class="button" href="https://open.spotify.com/artist/0XlOOlFvxmjMptg6k4c08n?si=iKj-HvlaTGyTilDCZieLTw" target="_blank">Spotify</a>
</header>
