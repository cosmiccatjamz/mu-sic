<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU-SIC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* NAV */

.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(8px);
z-index:999;
}

.nav a{
color:#6bd7ff;
text-decoration:none;
font-size:16px;
}

.nav a:hover{
color:white;
text-shadow:0 0 10px #6bd7ff;
}

/* STARFIELD */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-6;
}

/* MILKY WAY */

#galaxy{
position:fixed;
top:-200px;
left:-200px;
width:160%;
height:160%;
z-index:-5;
opacity:.25;
background:
radial-gradient(ellipse at center,
rgba(255,255,255,.35) 0%,
rgba(200,200,255,.2) 20%,
rgba(0,0,0,0) 70%);
transform:rotate(20deg);
animation:galaxyRotate 240s linear infinite;
}

@keyframes galaxyRotate{
0%{transform:rotate(20deg)}
100%{transform:rotate(380deg)}
}

/* NEBULA LAYERS */

.nebula{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#nebula1{
z-index:-4;
opacity:.25;
background:
radial-gradient(circle at 20% 30%, #2ad0ff55, transparent 40%),
radial-gradient(circle at 70% 70%, #8a2bff55, transparent 45%);
animation:nebulaSlow 60s linear infinite;
}

#nebula2{
z-index:-3;
opacity:.2;
background:
radial-gradient(circle at 40% 60%, #00ffd555, transparent 40%),
radial-gradient(circle at 80% 20%, #4e6bff55, transparent 40%);
animation:nebulaMed 40s linear infinite;
}

#nebula3{
z-index:-2;
opacity:.15;
background:
radial-gradient(circle at 50% 80%, #9a4cff55, transparent 40%),
radial-gradient(circle at 10% 60%, #00ffff55, transparent 35%);
animation:nebulaFast 25s linear infinite;
}

@keyframes nebulaSlow{
0%{transform:translateY(0)}
50%{transform:translateY(-60px)}
100%{transform:translateY(0)}
}

@keyframes nebulaMed{
0%{transform:translateX(0)}
50%{transform:translateX(60px)}
100%{transform:translateX(0)}
}

@keyframes nebulaFast{
0%{transform:translateY(0)}
50%{transform:translateY(30px)}
100%{transform:translateY(0)}
}

/* MOON */

#moon{
position:fixed;
top:70px;
right:70px;
width:80px;
height:80px;
border-radius:50%;
background:#f0f0f0;
box-shadow:0 0 40px #fff;
z-index:-1;
}

#moon:after{
content:"";
position:absolute;
top:0;
left:20px;
width:80px;
height:80px;
border-radius:50%;
background:black;
}

/* DRIFTING PLANET */

#planet{
position:fixed;
top:220px;
left:-200px;
width:140px;
height:140px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%, #ff9966, #552200);
box-shadow:0 0 40px #ff9966;
animation:planetDrift 200s linear infinite;
z-index:-1;
}

@keyframes planetDrift{
0%{transform:translateX(0)}
100%{transform:translateX(140vw)}
}

/* SATELLITE */

#satellite{
position:fixed;
top:140px;
left:-120px;
font-size:22px;
color:#cdefff;
text-shadow:0 0 10px #6bd7ff;
animation:orbit 120s linear infinite;
z-index:-1;
}

@keyframes orbit{
0%{transform:translateX(0)}
100%{transform:translateX(120vw)}
}

/* SHOOTING STARS */

.shooting-star{
position:fixed;
width:2px;
height:90px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:shoot 1.2s linear forwards;
z-index:-1;
}

@keyframes shoot{
0%{transform:translate(0,0) rotate(45deg);opacity:1;}
100%{transform:translate(-1000px,1000px) rotate(45deg);opacity:0;}
}

/* HEADER */

header{
min-height:95vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:url('https://f4.bcbits.com/img/a4068469156_16.jpg') center/cover;
position:relative;
}

header::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
}

header>*{
position:relative;
z-index:2;
}

/* LOGO */

#header-logo{
max-width:630px;
width:85%;
margin-top:70px;
margin-bottom:30px;
filter:drop-shadow(0 0 25px #6bd7ff);
}

/* BUTTON */

.button{
display:inline-block;
padding:12px 26px;
margin:10px;
background:#6bd7ff;
color:#000;
border-radius:8px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 15px #6bd7ff;
}

.section{
padding:80px 20px;
max-width:1000px;
margin:auto;
text-align:center;
}

footer{
padding:40px;
text-align:center;
color:#777;
background:#0b0b1f;
}

</style>
</head>

<body>

<nav class="nav">
<a href="#">Home</a>
<a href="#bio">Bio</a>
<a href="#music">Music</a>
<a href="writings.html">Writings</a>
</nav>

<canvas id="stars"></canvas>

<div id="galaxy"></div>

<div id="nebula1" class="nebula"></div>
<div id="nebula2" class="nebula"></div>
<div id="nebula3" class="nebula"></div>

<div id="moon"></div>
<div id="planet"></div>
<div id="satellite">🛰</div>

<header>

<img src="images/logo.png" id="header-logo">

<p>Intergalactic vibes from the cosmic everything</p>
<p>Pulling signals from stars and souls of eternities forever</p>

</header>

<footer>© 2026 MU-SIC</footer>

<script>

/* CANVAS SETUP */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];

/* RANDOM STARS */

for(let i=0;i<260;i++){

let depth=Math.random();

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:depth*1.8,
dx:(Math.random()-.5)*(0.035+depth*0.035),
dy:(Math.random()-.5)*(0.035+depth*0.035),
twinkle:Math.random()*100,
constellation:false
});

}

/* CONSTELLATION DATA (screen ratio coordinates) */

const constellations=[

/* ORION */

[
[0.45,0.35],
[0.48,0.42],
[0.52,0.35],
[0.48,0.50],
[0.52,0.55],
[0.44,0.55],
[0.50,0.45]
],

/* BIG DIPPER */

[
[0.2,0.25],
[0.25,0.28],
[0.3,0.3],
[0.35,0.33],
[0.42,0.35],
[0.46,0.32],
[0.5,0.28]
],

/* CASSIOPEIA */

[
[0.75,0.2],
[0.78,0.25],
[0.82,0.22],
[0.86,0.27],
[0.9,0.23]
]

];

/* ADD CONSTELLATION STARS */

constellations.forEach(group=>{

group.forEach(p=>{

stars.push({
x:p[0]*canvas.width,
y:p[1]*canvas.height,
r:2.4,
dx:0,
dy:0,
twinkle:Math.random()*100,
constellation:true
});

});

});

/* WARP MODE */

let warp=false;

/* ANIMATION */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{

s.x+=warp?s.dx*8:s.dx;
s.y+=warp?s.dy*8:s.dy;

if(s.x<0)s.x=canvas.width;
if(s.x>canvas.width)s.x=0;
if(s.y<0)s.y=canvas.height;
if(s.y>canvas.height)s.y=0;

s.twinkle+=0.04;

let brightness=(Math.sin(s.twinkle)+1)/2;

ctx.beginPath();

if(warp && !s.constellation){

ctx.moveTo(s.x,s.y);
ctx.lineTo(s.x-s.dx*40,s.y-s.dy*40);

}else{

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

}

ctx.strokeStyle="rgba(255,255,255,"+brightness+")";
ctx.fillStyle="rgba(255,255,255,"+brightness+")";

ctx.stroke();
ctx.fill();

});

/* DRAW CONSTELLATION LINES */

constellations.forEach(group=>{

for(let i=0;i<group.length-1;i++){

ctx.beginPath();

ctx.moveTo(group[i][0]*canvas.width,group[i][1]*canvas.height);
ctx.lineTo(group[i+1][0]*canvas.width,group[i+1][1]*canvas.height);

ctx.strokeStyle="rgba(120,200,255,.25)";
ctx.stroke();

}

});

requestAnimationFrame(animate);

}

animate();

/* WARP SCROLL */

window.addEventListener("scroll",()=>{

let music=document.getElementById("music");
if(!music)return;

let dist=Math.abs(window.scrollY-music.offsetTop);

warp=dist<250;

});

/* SHOOTING STARS */

function shooting(){

const star=document.createElement("div");
star.className="shooting-star";

star.style.top=Math.random()*window.innerHeight+"px";
star.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(star);

setTimeout(()=>star.remove(),1200);

}

setInterval(()=>{
if(Math.random()>.7)shooting();
},3500);

/* COSMIC JETPACK CATS */

function launchCat(){

const cat=document.createElement("div");

cat.innerHTML="🐱‍🚀";
cat.style.position="fixed";
cat.style.fontSize="26px";
cat.style.left="-60px";
cat.style.top=Math.random()*window.innerHeight+"px";
cat.style.zIndex="-1";
cat.style.transition="transform 60s linear";

document.body.appendChild(cat);

setTimeout(()=>{

cat.style.transform="translateX(120vw)";

},50);

setTimeout(()=>{

cat.remove();

},60000);

}

/* cat launch timer */

setInterval(()=>{
if(Math.random()>.6)launchCat();
},9000);

</script>

</body>
</html>
